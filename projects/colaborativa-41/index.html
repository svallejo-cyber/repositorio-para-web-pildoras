<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colaborativa 41 · Del forecast manual a la planificación inteligente y escalable</title>
  <style>
    :root { --bg:#eef3f7; --panel:#fff; --ink:#17212c; --muted:#5f6d7c; --line:#d6dee8; --accent:#0f5f94; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:24px; font-family:"IBM Plex Sans",sans-serif; color:var(--ink); background:radial-gradient(circle at 8% 4%,#dce9f4 0,transparent 22%), radial-gradient(circle at 90% 0%,#e8eef3 0,transparent 24%), var(--bg); }
    .card { width:min(720px,100%); background:var(--panel); border:1px solid var(--line); border-radius:16px; box-shadow:0 14px 34px rgba(17,34,52,.08); padding:28px; }
    .kicker { text-transform:uppercase; letter-spacing:.08em; font-size:.78rem; color:#5a7186; font-weight:700; margin:0 0 10px; }
    h1 { margin:0 0 10px; font-size:clamp(1.9rem,3vw,2.5rem); line-height:1.15; }
    p { margin:0 0 14px; color:var(--muted); line-height:1.55; }
    .actions { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; margin-top:18px; }
    a { display:block; text-decoration:none; text-align:center; border-radius:12px; padding:14px 16px; font-weight:700; color:#fff; background:linear-gradient(135deg,#0f5f94,#1b78b6); }
    a:last-child { background:linear-gradient(135deg,#1d7b65,#25917a); }
    @media (max-width:680px) { .actions { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main class="card">
    <p class="kicker">Hub IA Isaval</p>
    <h1>Colaborativa 41 · Del forecast manual a la planificación inteligente y escalable</h1>
    <p>Selecciona idioma para acceder al resumen ejecutivo y al anexo completo de la pieza.</p>
    <div class="actions">
      <a href="./es/">Leer en español</a>
      <a href="./en/">Read in English</a>
    </div>
  </main>
</body>
</html>
