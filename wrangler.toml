name = "repositorio-para-web-pildoras"
main = "src/worker.js"
compatibility_date = "2026-03-13"

[vars]
NOTIFY_SENDER_EMAIL = "svallejo@isaval.es"
NOTIFY_TIMEZONE = "Europe/Madrid"
M365_NOTIFICATIONS_ENABLED = "false"
IDEA_SUBMISSION_NOTIFY_EMAIL = "svallejoi@icloud.com"
RESEND_FROM_EMAIL = "Hub IA Isaval <onboarding@resend.dev>"

[assets]
directory = "."
binding = "ASSETS"
run_worker_first = true

[triggers]
crons = [ "0 * * * *" ]

[[durable_objects.bindings]]
name = "HUB_DATA"
class_name = "HubData"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["HubData"]
